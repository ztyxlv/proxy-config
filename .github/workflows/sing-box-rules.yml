permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: "0 20 * * *"

  push:
    paths:
      - sing-box/rules/manifest.yaml
      - .github/workflows/sing-box-rules.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - run: |
          SINGBOX_URL=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | yq -r '.assets[] | select(.name | test("sing-box-[0-9.]+-linux-amd64\\.tar\\.gz$")) | .browser_download_url')

          curl -fsSL "$SINGBOX_URL" | tar -xz
          sudo mv sing-box-*-linux-amd64/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          rm -rf sing-box-*-linux-amd64

      - run: |
          rm -rf sing-box/rules/{source,merged,compiled}
          mkdir -p sing-box/rules/{source,merged,compiled}

      - run: |
          yq -r '.rules[].name' sing-box/rules/manifest.yaml \
            | xargs -n1 -P10 sh -c 'mkdir -p "sing-box/rules/source/$1"' sh

      - run: |
          yq -r '.rules[] | select(.remote) | .name + " " + (.remote[])' sing-box/rules/manifest.yaml \
            | xargs -n2 -P10 sh -c 'curl -fsSL "$2" -o "sing-box/rules/source/$1/${2##*/}"' sh

      - run: |
          echo 'def apply_exclude(exc): reduce exc[] as $e (.; reduce ($e | to_entries[]) as $i (.; if has($i.key) then if ($i.value|type) == "array" then .[$i.key] -= $i.value | if (.[$i.key]|length)==0 then del(.[$i.key]) else . end else if .[$i.key] == $i.value then del(.[$i.key]) else . end end else . end)); def merge_rules: reduce .[] as $r ({}; reduce ($r | to_entries[]) as $e (.; if ($e.value|type) == "array" then .[$e.key] = ((.[$e.key] // []) + $e.value) else .[$e.key] = $e.value end)) | with_entries(if (.value|type) == "array" then .value |= (unique | sort) else . end); ($remote | map(apply_exclude($exclude))) as $filtered | ($filtered + $include) as $all | {version: 4, rules: (if ($all|length) == 0 then [] else [$all | merge_rules] end)}' > merge.jq

      - run: |
          for d in sing-box/rules/source/*; do
            name="${d##*/}"
            outfile="sing-box/rules/merged/${name}.json"

            include=$(yq -o=json ".rules[] | select(.name == \"${name}\") | .include // []" sing-box/rules/manifest.yaml)
            exclude=$(yq -o=json ".rules[] | select(.name == \"${name}\") | .exclude // []" sing-box/rules/manifest.yaml)

            if compgen -G "$d/*.json" > /dev/null; then
              remote=$(jq -cs "[.[].rules[]]" "$d"/*.json)
            else
              remote='[]'
            fi

          jq -n \
              --rawfile remote /tmp/remote.json \
              --rawfile exclude /tmp/exclude.json \
              --rawfile include /tmp/include.json \
              '($remote|fromjson) as $remote | ($exclude|fromjson) as $exclude | ($include|fromjson) as $include' \
              -f merge.jq > "$outfile"
          done

      - run: |
          for f in sing-box/rules/merged/*.json; do
            name="${f##*/}"
            name="${name%.json}"

            sing-box rule-set compile "$f" -o "sing-box/rules/compiled/${name}.srs"
          done

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sing-box/rules
          git diff --cached --quiet || (
            git commit -m "Updated on $(TZ=Asia/Shanghai date '+%F at %T')"
            git pull --rebase
            git push
          )
