permissions:
  contents: write

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: |
          sudo curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - run: |
          rm -rf clash/rules/{source,merged}
          mkdir -p clash/rules/{source,merged}

      - run: |
          yq -r '.rules[].name' clash/rules/manifest.yaml \
          | xargs -I{} sh -c 'mkdir -p "clash/rules/source/{}"'

      - run: |
          yq -r '.rules[] | select(.remote and (.remote | length > 0)) | .name + " " + (.remote[]? // "")' clash/rules/manifest.yaml \
          | xargs -n 2 -P 10 sh -c 'curl -L "$2" -o "clash/rules/source/$1/${2##*/}"' sh

      - run: |
          for d in clash/rules/source/*; do
            name="${d##*/}"
            outfile="clash/rules/merged/${name}.yaml"

            echo "payload:" > "$outfile"

            yq -r ".rules[] | select(.name == \"${name}\") | .local[]?" clash/rules/manifest.yaml \
              | sed 's/^/  - /' \
              >> "$outfile"

            if ls "$d"/*.yaml 1> /dev/null 2>&1; then
              yq eval-all '.payload[]' "$d"/*.yaml \
                | grep -v '^---$' \
                | sed 's/^/  - /' \
                >> "$outfile"
            fi
          done

      - run: |
          rm -rf surge/rules/{source,merged}
          mkdir -p surge/rules/{source,merged}

      - run: |
          yq -r '.rules[].name' surge/rules/manifest.yaml \
          | xargs -I{} sh -c 'mkdir -p "surge/rules/source/{}"'

      - run: |
          yq -r '.rules[] | select(.remote and (.remote | length > 0)) | .name + " " + (.remote[]? // "")' surge/rules/manifest.yaml \
          | xargs -n 2 -P 10 sh -c 'curl -L "$2" -o "surge/rules/source/$1/${2##*/}"' sh

      - run: |
          for d in surge/rules/source/*; do
            name="${d##*/}"
            outfile="surge/rules/merged/${name}.list"

            > "$outfile"

            yq -r ".rules[] | select(.name == \"${name}\") | .local[]?" surge/rules/manifest.yaml \
              >> "$outfile"

            if ls "$d"/*.list 1> /dev/null 2>&1; then
              grep -hv '^#' "$d"/*.list \
                >> "$outfile"
            fi
          done

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Updated on $(TZ=Asia/Shanghai date '+%F at %T')" || true
          git push
