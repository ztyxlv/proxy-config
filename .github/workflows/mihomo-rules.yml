permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: "0 20 * * *"

  push:
    paths:
      - mihomo/rules/manifest.yaml
      - .github/workflows/mihomo-rules.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - run: |
          MIHOMO_URL=$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | yq -r '.assets[] | select(.name | test("mihomo-linux-amd64-v3-.*\\.gz$")) | .browser_download_url')

          curl -fsSL "$MIHOMO_URL" \
            | gunzip > mihomo-bin
          sudo mv mihomo-bin /usr/local/bin/mihomo
          sudo chmod +x /usr/local/bin/mihomo

      - run: |
          rm -rf mihomo/rules/{source,merged,compiled}
          mkdir -p mihomo/rules/{source,merged,compiled}

      - run: |
          yq -r '.rules[].name' mihomo/rules/manifest.yaml \
            | xargs -n 1 -P 10 sh -c 'mkdir -p "mihomo/rules/source/$1"' sh

      - run: |
          yq -r '.rules[] | select(.remote) | .name + " " + (.remote[])' mihomo/rules/manifest.yaml \
            | xargs -n 2 -P 10 sh -c 'curl -fsSL "$2" -o "mihomo/rules/source/$1/${2##*/}"' sh

      - run: |
          for d in mihomo/rules/source/*; do
            name="${d##*/}"
            outfile="mihomo/rules/merged/${name}.yaml"

            type=$(yq -r ".rules[] | select(.name == \"${name}\") | .type" mihomo/rules/manifest.yaml)

            if compgen -G "$d/*.mrs" > /dev/null; then
              continue
            fi

            echo "payload:" > "$outfile"

            exclude=$(yq -r ".rules[] | select(.name == \"${name}\" and .exclude) | .exclude[]" mihomo/rules/manifest.yaml 2>/dev/null || true)

            format_line() {
              if [ "$type" = "domain" ]; then
                sed 's/^/  - "/; s/$/"/'
              else
                sed 's/^/  - /'
              fi
            }

            yq -r ".rules[] | select(.name == \"${name}\" and .include) | .include[]" mihomo/rules/manifest.yaml \
              | format_line >> "$outfile"

            if compgen -G "$d/*.yaml" > /dev/null; then
              if [ -n "$exclude" ]; then
                yq eval-all '.payload[]' "$d"/*.yaml \
                  | grep -vxFf <(printf '%s\n' "$exclude") \
                  | format_line >> "$outfile"
              else
                yq eval-all '.payload[]' "$d"/*.yaml \
                  | format_line >> "$outfile"
              fi
            fi

            if compgen -G "$d/*.list" > /dev/null; then
              if [ -n "$exclude" ]; then
                cat "$d"/*.list \
                  | grep -vxFf <(printf '%s\n' "$exclude") \
                  | format_line >> "$outfile"
              else
                cat "$d"/*.list \
                  | format_line >> "$outfile"
              fi
            fi
          done

      - run: |
          yq -r '.rules[] | [.name, .type] | @tsv' mihomo/rules/manifest.yaml \
            | while IFS=$'\t' read -r name type; do
              source="mihomo/rules/source/${name}"
              merged="mihomo/rules/merged/${name}.yaml"
              compiled="mihomo/rules/compiled/${name}.mrs"

              if compgen -G "$source/*.mrs" > /dev/null; then
                cp "$source"/*.mrs "$compiled"
              elif [ "$type" = "domain" ] || [ "$type" = "ipcidr" ]; then
                if [ -f "$merged" ]; then
                  mihomo convert-ruleset "$type" yaml "$merged" "$compiled"
                fi
              fi
            done

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mihomo/rules
          git diff --cached --quiet || git commit -m "Updated on $(TZ=Asia/Shanghai date '+%F at %T')"
          git push
